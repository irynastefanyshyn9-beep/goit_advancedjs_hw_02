<body>
  <main>
    <div class="container"> <a class="back-link" href="./index.html">Go back</a>
      <h1 class="main-title">Snackbar</h1>

      <form class="form">
        <label class="form-label">
          Delay (ms)
          <input type="number" name="delay" class="form-input" required />
        </label>

        <fieldset class="form-fieldset">
          <legend>State</legend>
          <div class="radio-group">
            <label>
              <input type="radio" name="state" value="fulfilled" required />
              Fulfilled
            </label>
            <label>
              <input type="radio" name="state" value="rejected" required />
              Rejected
            </label>
          </div>
        </fieldset>

        <button type="submit" class="submit-btn">Create notification</button>
      </form>
    </div>
  </main>
